name: Feature Request
description: Suggest a new feature or improvement
title: '[Feature] '
labels: ['enhancement']
assignees: []
projects: []
milestone: ''
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature? We'd love to hear it. Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits and how?
      placeholder: |
        As a [type of user], I want [goal] so that [benefit].

        Currently, to accomplish [goal], I have to [workaround].
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be as concrete as possible.
      placeholder: |
        When the user does [action], Agent Vault should [behavior].

        A mockup or sketch is helpful here.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider? Why did you prefer this approach?
      placeholder: |
        Alternative 1: [description] — rejected because ...
        Alternative 2: [description] — rejected because ...

  - type: textarea
    id: vault-context
    attributes:
      label: Vault / agent context (optional)
      description: |
        If your feature involves agents, skills, memory notes, tools, or wiki links,
        describe the vault setup where this would be most useful.
      placeholder: |
        My vault has: agents with skills under Agents/Skills/, memory notes in Memory/, tools in Tools/MCP/

  - type: checkboxes
    id: willingness
    attributes:
      label: Would you be willing to help implement this?
      options:
        - label: Yes, I can contribute code
        - label: Yes, I can help test it
        - label: No, I just want to see it exist
